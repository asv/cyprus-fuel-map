<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Cyprus Fuel</title>
    <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
    <link rel="stylesheet" href="leaflet.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="map" aria-label="Fuel station map"></section>

      <header class="topbar">
        <label class="fuel-picker" aria-label="Fuel type">
          <svg class="control-icon fuel-icon" aria-hidden="true" viewBox="0 0 24 24">
            <path d="M3 22h12" />
            <path d="M5 22V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v17" />
            <path d="M9 7h2" />
            <path d="M15 9h2.2a2.3 2.3 0 0 1 2.3 2.3V17a1.7 1.7 0 0 0 3.4 0v-5.4a4.4 4.4 0 0 0-1.3-3.1L19 5.8" />
          </svg>
          <select id="fuel">
            <option value="1">Unleaded 95</option>
            <option value="2">Unleaded 98</option>
            <option value="3">Diesel</option>
            <option value="4">Heating oil</option>
            <option value="5">Kerosene</option>
          </select>
        </label>

        <div class="topbar-actions">
          <button
            id="trends"
            class="icon-button trend-button"
            type="button"
            aria-label="Show market trends"
            aria-pressed="false"
            title="Show market trends"
          >
            <svg class="control-icon trend-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M3 17l5-5 4 4 7-9" />
              <path d="M14 7h5v5" />
            </svg>
          </button>
          <button id="locate" class="icon-button locate-button" type="button" aria-label="Use my location" title="Use my location">
            <svg class="control-icon locate-icon" aria-hidden="true" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="5" />
              <path d="M12 2v3" />
              <path d="M12 19v3" />
              <path d="M2 12h3" />
              <path d="M19 12h3" />
            </svg>
          </button>
        </div>
      </header>

      <aside class="bottom-sheet is-collapsed" aria-label="Fuel station controls">
        <div class="sheet-drag-region">
          <button
            id="sheet-handle"
            class="sheet-handle"
            type="button"
            aria-expanded="false"
            aria-label="Show station list"
            title="Show station list"
          ></button>

          <div class="summary-card">
            <section id="summary" class="summary"></section>
            <button id="refresh" class="refresh-button" type="button" aria-label="Refresh prices" title="Refresh prices">
              <svg class="control-icon refresh-icon" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M21 12a9 9 0 0 1-15.1 6.6" />
                <path d="M3 12A9 9 0 0 1 18.1 5.4" />
                <path d="M18 2v4h-4" />
                <path d="M6 22v-4h4" />
              </svg>
              <span id="status" class="status">Starting...</span>
            </button>
          </div>
        </div>

        <div class="filters">
          <label class="price-filter">
            <span>Max price</span>
            <strong id="price-limit-label">all</strong>
            <input id="price-limit" type="range" min="0" max="1" step="0.001" value="1" disabled />
          </label>
        </div>

        <section id="market-trends" class="market-trends" aria-labelledby="market-trends-title" hidden>
          <div class="section-title">
            <h2 id="market-trends-title">Market trends</h2>
          </div>
          <div id="market-trend" class="trend-card"></div>
        </section>

        <div class="section-title">
          <h2>Stations</h2>
          <fieldset class="sort-toggle">
            <legend class="visually-hidden">Sort stations</legend>
            <button id="sort-cheapest" class="sort-option is-active" type="button" aria-pressed="true">Cheapest</button>
            <button id="sort-best" class="sort-option" type="button" aria-pressed="false">Best</button>
            <button id="sort-nearby" class="sort-option" type="button" aria-pressed="false">Nearby</button>
          </fieldset>
        </div>
        <div id="station-list" class="station-list"></div>
      </aside>
    </main>

    <script src="leaflet.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
