<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Cyprus Fuel</title>
    <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
    <link rel="stylesheet" href="leaflet.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="map" aria-label="Fuel station map"></section>

      <header class="topbar">
        <div class="brand">
          <h1>Cyprus Fuel</h1>
          <p id="status" class="status">Starting...</p>
        </div>

        <div class="topbar-actions">
          <label class="fuel-picker" aria-label="Fuel type">
            <select id="fuel">
              <option value="1">Unleaded 95</option>
              <option value="2">Unleaded 98</option>
              <option value="3">Diesel</option>
              <option value="4">Heating oil</option>
              <option value="5">Kerosene</option>
            </select>
          </label>

          <button id="refresh" class="icon-button" type="button" aria-label="Refresh prices" title="Refresh prices">
            Refresh
          </button>
          <button id="locate" class="icon-button primary" type="button" aria-label="Use my location" title="Use my location">
            Locate
          </button>
        </div>
      </header>

      <aside class="bottom-sheet" aria-label="Fuel station controls">
        <div class="sheet-handle" aria-hidden="true"></div>

        <section id="summary" class="summary"></section>

        <div class="filters">
          <label class="price-filter">
            <span>Max price</span>
            <strong id="price-limit-label">all</strong>
            <input id="price-limit" type="range" min="0" max="1" step="0.001" value="1" disabled />
          </label>
        </div>

        <div class="section-title">
          <h2>Stations</h2>
          <span>Cheapest first</span>
        </div>
        <div id="station-list" class="station-list"></div>
      </aside>
    </main>

    <script src="leaflet.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
